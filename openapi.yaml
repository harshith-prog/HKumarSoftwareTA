openapi: 3.0.3
info:
  title: Vehicle Analytics API Assessment
  version: 1.0.0
  description: >
    API that consumes the emulator telemetry stream and exposes sensor metadata and
    latest telemetry readings. Invalid emulator readings are filtered at the API.

servers:
  - url: http://localhost:4000
    description: Local development server (docker compose)

paths:
  /health:
    get:
      summary: Health check
      description: Confirms the API is running (and optionally that the emulator is reachable).
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Emulator unavailable (if /health checks emulator reachability)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sensors:
    get:
      summary: Sensor metadata
      description: >
        Returns static sensor metadata used to map sensorId to a human-readable sensorName and unit.
        This API also includes minValue/maxValue for range validation.
        Clients typically call this once on page load and cache the result.
      responses:
        "200":
          description: List of sensors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sensor"

  /telemetry:
    get:
      summary: Latest telemetry per sensor
      description: >
        Returns the latest valid reading per sensor. The API stores latest readings from the emulator
        WebSocket stream and drops invalid readings (wrong types/malformed). Each reading includes a
        computed status ("ok" or "out_of_range").
      responses:
        "200":
          description: Latest readings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetryResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          example: true
        emulator:
          type: object
          additionalProperties: true
          description: Optional emulator diagnostics if included in /health response.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: Emulator unreachable

    Sensor:
      type: object
      required: [sensorId, sensorName, unit]
      properties:
        sensorId:
          type: integer
          format: int64
          description: Emulator-provided sensor identifier.
          example: 1000000070501
        sensorName:
          type: string
          example: BATTERY_TEMPERATURE
        unit:
          type: string
          example: C
        minValue:
          type: number
          description: Valid minimum value for this sensor (inclusive).
          example: 20
        maxValue:
          type: number
          description: Valid maximum value for this sensor (inclusive).
          example: 80

    ReadingStatus:
      type: string
      enum: [ok, out_of_range]

    Reading:
      type: object
      required: [sensorId, value, timestamp, status]
      properties:
        sensorId:
          type: integer
          format: int64
          example: 1000000070501
        value:
          type: number
          example: 53.0738154210323
        timestamp:
          type: string
          format: date-time
          example: "2026-03-03T11:34:36.897Z"
        status:
          $ref: "#/components/schemas/ReadingStatus"

    TelemetryResponse:
      type: object
      required: [readings]
      properties:
        readings:
          type: array
          items:
            $ref: "#/components/schemas/Reading"